[scene.begin]
background = "@assets/bg.jpg"
zoom = 100

[[scene.begin.characters]]
name = "Kasen"
sprite = "@assets/kasen.png"
animation = "enterLeft 1s"


[[scene.begin.characters]]
name = "Reimu"
sprite = "@assets/reimu.png"
animation = "enterRight"


[[scene.begin.dialogue]]
speaker = "Kasen"
text = "Hello, Reimu! Welcome to the world of Ren'Py in Go!"
effect = "Fade"


[[scene.begin.dialogue]]
speaker = "Reimu"
text = "Hi, Kasen! This is amazing! I can't wait to see what we can do with this engine!"
effect = "Write"

[[scene.begin.dialogue]]
speaker = "Reimu"
text = "Let's start by creating a new scene and adding some dialogue!"
effect = "Wavy"


[[scene.begin.dialogue]]
speaker = "Kasen"
text = "Great idea! We can also add some character animations and background music to make it more immersive!"