[scene.test_history]
index = 3
background = "@assets/bg/base.jpg"
background_music = "@assets/audio/bgm/Ghostly Dream - Snow or Cherry Petal.mp3"
zoom = 100

[[scene.test_history.characters]]
ref = "k"
animation = "enterLeft 1s"

[[scene.test_history.characters]]
name = "Mysterious Guest"
sprite = "@assets/characters/guest.png"
animation = "fadeIn 2s"
shown = true

[[scene.test_history.characters]]
ref = "r"
animation = "enterRight"
shown = false

[[scene.test_history.dialogue]]
speaker = "Kasen"
say.text = "Welcome to the demo scene — this file shows all supported features."
say.effect = "fade"

[[scene.test_history.dialogue]]
speaker = "Mysterious Guest"
say.text = "I appear with a custom sprite and a fade-in animation."
say.effect = "typewriter"
togo = "after_guest"

[[scene.test_history.dialogue]]
ask.question = "Which path will you choose?"
ask.options = [
  {text = "Explore the forest", goto = "forest_path"},
  "Open the door", #goto secret_room
]

[[scene.test_history.dialogue]]
input.label = "Your name"
input.placeholder = "Type your name..."
input.type = "text"
input.validation = "^[A-Za-z ]+$"
input.on_submit_set = "$vars.player.name=input"
input.on_submit_goto = "welcome_back"

[[scene.test_history.dialogue]]
speaker = "Reimu"
shown = false
say.text = "I'm hidden initially and won't show unless toggled."
say.effect = ""

[[scene.test_history.dialogue]]
speaker = "Kasen"
say.text = "This is the end of the history demo."
say.effect = "fade"
